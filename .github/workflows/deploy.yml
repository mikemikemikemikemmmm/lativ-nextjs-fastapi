name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
    paths:
      - 'backend-admin/**'
      - '.github/**'

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      VM_NAME: ${{ secrets.GCP_VM_NAME }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ZONE: ${{ secrets.GCP_ZONE }}
      TARGET_DIR: "/var/www/lativ-fastapi"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Compress Project
      run: |
        # 只打包後端程式碼與必要的設定
        tar -czf deploy.tar.gz backend-admin/

    - name: Upload to VM via IAP
      run: |
        gcloud compute scp deploy.tar.gz "$VM_NAME":/tmp/deploy.tar.gz \
          --project="$PROJECT_ID" \
          --zone="$ZONE" \
          --tunnel-through-iap

    - name: Execute Remote Deployment
      run: |
        gcloud compute ssh "$VM_NAME" \
          --project="$PROJECT_ID" \
          --zone="$ZONE" \
          --tunnel-through-iap \
          --command="
            set -e
            
            # 1. 準備目錄
            sudo mkdir -p $TARGET_DIR
            sudo chown -R \$USER:\$USER $TARGET_DIR

            # 2. 解壓縮並覆蓋 (使用 --strip-components 視目錄結構調整)
            tar -xzf /tmp/deploy.tar.gz -C $TARGET_DIR/
            
            # 3. 執行部署腳本
            cd $TARGET_DIR/backend-admin
            chmod +x scripts/prod/run.sh
            ./scripts/prod/run.sh
          "