name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
    # 建議加上 path 過濾，只有當 backend 資料夾變動時才觸發 (選擇性)
    paths:
      - 'backend-admin/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 這裡可以根據需要保留或移除，若使用 SA KEY 則不需要 permissions 寫入 id-token
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 登入 Google Cloud (使用你提供的 Service Account Key)
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # 2. 設定 gcloud SDK
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    # 3. 透過 IAP 隧道執行遠端指令
    - name: 'Deploy via SSH IAP'
      run: |
        # 預先設定 SSH 權限以免跳出互動提示
        gcloud compute config-ssh --quiet

        gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --zone=${{ secrets.GCP_ZONE }}  \
          --tunnel-through-iap \
          --command="
            # 1. 進入專案目錄
            cd /var/www/lativ-fastapi &&
            
            # 2. 拉取最新程式碼 (若之前設過 sparse-checkout，這裡只會拉取特定部分)
            git pull origin main &&
            
            # 3. 更新虛擬環境中的套件
            ./venv/bin/pip install -r requirements.txt &&
            
            # 4. 重啟服務 (使用 sudo 並確保 visudo 已設定免密碼)
            sudo systemctl restart fastapi
          "