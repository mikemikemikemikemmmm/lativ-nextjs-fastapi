name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
    paths:
      - 'backend-admin/**'
      - '.github/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy via SSH (IAP)
      run: |
            gcloud compute config-ssh --quiet

            VM_NAME="${{ secrets.GCP_VM_NAME }}"
            PROJECT="${{ secrets.GCP_PROJECT_ID }}"
            ZONE="${{ secrets.GCP_ZONE }}"
            REPO_URL="https://github.com/mikemikemikemikemmmm/lativ-nextjs-fastapi.git"
            TARGET_DIR="/var/www/lativ-fastapi"

            gcloud compute ssh $VM_NAME \
            --project=$PROJECT \
            --zone=$ZONE \
            --tunnel-through-iap \
            --command="
                set -e
                
                # 1. 使用 sudo 建立目錄，並確保當前使用者擁有該目錄權限
                if [ ! -d '$TARGET_DIR' ]; then
                echo '📁 Creating target directory...'
                sudo mkdir -p $TARGET_DIR
                fi
                
                # 關鍵：強制修正權限，確保 $USER 擁有該目錄及其父目錄的寫入權
                sudo chown -R \$USER:\$USER $TARGET_DIR

                # 2. Git Clone 或 Pull
                if [ ! -d '$TARGET_DIR/.git' ]; then
                echo '📦 Cloning repository...'
                # 在 clone 之前先確保目錄是空的，避免 git 因為目錄已存在而報錯
                rm -rf $TARGET_DIR/* $TARGET_DIR/.* 2>/dev/null || true
                git clone $REPO_URL $TARGET_DIR
                else
                echo '⬇️ Pulling latest changes...'
                cd $TARGET_DIR
                git fetch origin main
                git reset --hard origin/main
                fi

                # 3. 執行專案內的部署腳本
                cd $TARGET_DIR
                echo '🏃 Running project deployment script...'
                --command="bash -l -c 'chmod +x ./backend-admin/scripts/prod/run.sh && ./backend-admin/scripts/prod/run.sh'"
            "