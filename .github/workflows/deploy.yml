name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
    paths:
      - 'backend-admin/**'
      - '.github/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy via SSH (IAP)
      run: |
            gcloud compute config-ssh --quiet

            # 定義變數方便維護
            VM_NAME="${{ secrets.GCP_VM_NAME }}"
            PROJECT="${{ secrets.GCP_PROJECT_ID }}"
            ZONE="${{ secrets.GCP_ZONE }}"
            REPO_URL="https://github.com/mikemikemikemikemmmm/lativ-nextjs-fastapi.git"
            TARGET_DIR="/var/www/lativ-fastapi"

            gcloud compute ssh $VM_NAME \
            --project=$PROJECT \
            --zone=$ZONE \
            --tunnel-through-iap \
            --command="
                set -e
                
                # 1. 處理目錄與權限
                if [ ! -d '$TARGET_DIR' ]; then
                sudo mkdir -p $TARGET_DIR
                sudo chown -R \$USER:\$USER $TARGET_DIR
                fi

                # 2. Git Clone 或 Pull
                if [ ! -d '$TARGET_DIR/.git' ]; then
                echo '📦 Cloning repository...'
                git clone $REPO_URL $TARGET_DIR
                cd $TARGET_DIR
                else
                echo '⬇️ Pulling latest changes...'
                cd $TARGET_DIR
                git fetch origin main
                git reset --hard origin/main
                fi

                # 3. 執行專案內的部署腳本
                echo '🏃 Running project deployment script...'
                chmod +x ./backend-admin/scripts/prod/run.sh
                ./backend-admin/scripts/prod/run.sh
            "