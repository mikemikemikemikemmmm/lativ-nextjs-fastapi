name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
    paths:
      - 'backend-admin/**'
      - '.github/**'

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      VM_NAME: ${{ secrets.GCP_VM_NAME }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ZONE: ${{ secrets.GCP_ZONE }}
      TARGET_DIR: "/var/www/lativ-fastapi"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Compress backend
        # 直接在根目錄壓縮內容，避免解壓後多一層目錄
      run: tar -czf deploy.tar.gz -C backend-admin .

    - name: Upload to VM
      run: |
          gcloud compute scp deploy.tar.gz "$VM_NAME":/tmp/deploy.tar.gz \
            --project="$PROJECT_ID" \
            --zone="$ZONE" \
            --tunnel-through-iap

    - name: Execute Remote Deploy
      run: |
          gcloud compute ssh "$VM_NAME" \
            --project="$PROJECT_ID" \
            --zone="$ZONE" \
            --tunnel-through-iap \
            --command="
              set -e
              # 1. 初始化路徑
              export PATH=\$HOME/.local/bin:\$PATH
              sudo mkdir -p $TARGET_DIR
              sudo chown \$USER:\$USER $TARGET_DIR

              # 2. 解壓並清理舊檔 (排除 logs 資料夾以防遺失紀錄)
              find $TARGET_DIR -maxdepth 1 ! -name 'logs' ! -path $TARGET_DIR -exec rm -rf {} +
              tar -xzf /tmp/deploy.tar.gz -C $TARGET_DIR/
              rm /tmp/deploy.tar.gz
              
              echo '📝 Creating .env.prod...' 
              echo '${{ secrets.ENV_FILE_CONTENT }}' | base64 --decode > $TARGET_DIR/.env.prod

              # 3. 安裝/同步依賴
              cd $TARGET_DIR
              command -v uv &> /dev/null || (curl -LsSf https://astral.sh/uv/install.sh | sh)
              
              echo '🛠️ Syncing dependencies...'
              uv sync --frozen --no-dev

              # 4. 執行啟動腳本
              chmod +x scripts/prod/run.sh
              ./scripts/prod/run.sh
            "