name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
    paths:
      - 'backend-admin/**'
      - '.github/**'

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      VM_NAME: ${{ secrets.GCP_VM_NAME }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ZONE: ${{ secrets.GCP_ZONE }}
      TARGET_DIR: "/var/www/lativ-fastapi"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Compress backend
      run: tar -czf deploy.tar.gz backend-admin/

    - name: Upload to VM via IAP
      run: |
        gcloud compute scp deploy.tar.gz "$VM_NAME":/tmp/deploy.tar.gz \
          --project="$PROJECT_ID" \
          --zone="$ZONE" \
          --tunnel-through-iap

    - name: Extract & install dependencies on VM
      run: |
        gcloud compute ssh "$VM_NAME" \
          --project="$PROJECT_ID" \
          --zone="$ZONE" \
          --tunnel-through-iap \
          --command="
            set -e

            # 1. 準備目錄
            sudo mkdir -p $TARGET_DIR
            sudo chown -R \$USER:\$USER $TARGET_DIR

            # 2. 解壓縮
            tar -xzf /tmp/deploy.tar.gz -C $TARGET_DIR/
            rm /tmp/deploy.tar.gz

            # 3. 安裝 uv（若尚未安裝）
            if ! command -v uv &> /dev/null; then
              echo '📦 Installing uv...'
              curl -LsSf https://astral.sh/uv/install.sh | sh
              source \$HOME/.local/bin/env
            fi

            # 4. 同步 Python 依賴
            echo '🛠️  Running uv sync...'
            cd $TARGET_DIR/backend-admin
            uv sync --frozen --no-dev
          "

    - name: Start service on VM
      run: |
        gcloud compute ssh "$VM_NAME" \
          --project="$PROJECT_ID" \
          --zone="$ZONE" \
          --tunnel-through-iap \
          --command="
            set -e
            cd $TARGET_DIR/backend-admin
            chmod +x scripts/prod/run.sh
            ./scripts/prod/run.sh
          "