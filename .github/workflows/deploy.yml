name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
    paths:
      - 'backend-admin/**'
      - '.github/**'

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      VM_NAME: ${{ secrets.GCP_VM_NAME }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ZONE: ${{ secrets.GCP_ZONE }}
      TARGET_DIR: "/var/www/lativ-fastapi"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Add metaData
        run: |
          gcloud compute instances add-metadata instance-20260306-130539 \
            --project="$PROJECT_ID" \
            --zone="$ZONE" \
            --metadata=enable-oslogin=TRUE

      - name: Prepare SSH environment
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # 建立一個空的 known_hosts 以防 gcloud 嘗試寫入時鎖死
          touch ~/.ssh/google_compute_known_hosts
          chmod 644 ~/.ssh/google_compute_known_hosts
          
      - name: Deploy and Execute
        run: |
          $(gcloud info --format="value(basic.python_location)") -m pip install numpy
          echo "📦 Compressing and uploading..."
          tar czf - -C backend-admin . | gcloud compute ssh "$VM_NAME" \
            --project="$PROJECT_ID" \
            --zone="$ZONE" \
            --tunnel-through-iap \
            --ssh-flag="-o ConnectTimeout=10" \
            --ssh-flag="-o ServerAliveInterval=10" \
            --command="mkdir -p /tmp/deploy_staging && tar xzf - -C /tmp/deploy_staging"

          # 2. 執行部署邏輯
          echo "🚀 Executing deployment on VM..."
          # 將 secret 轉為 Base64 傳遞，避免特殊字元被 Shell 解析錯誤
          ENV_B64=$(printf "%s" "${{ secrets.ENV_FILE_CONTENT }}" | base64 | tr -d '\n')
         

          gcloud compute ssh "$VM_NAME" \
            --project="$PROJECT_ID" \
            --zone="$ZONE" \
            --tunnel-through-iap \
            --command="
              set -e
              TARGET_DIR=\"$TARGET_DIR\"
              
              # 初始化路徑與權限
              sudo mkdir -p \$TARGET_DIR
              sudo chown -R \$USER:\$USER \$TARGET_DIR

              # 清理舊檔案 (保留 logs)
              find \$TARGET_DIR -maxdepth 1 ! -name 'logs' ! -path \$TARGET_DIR -exec rm -rf {} +
              
              # 從暫存區移動檔案
              cp -r /tmp/deploy_staging/* \$TARGET_DIR/
              rm -rf /tmp/deploy_staging
              
              # 建立 .env.prod
              printf '%s' '$ENV_B64' | base64 -d > \"\$TARGET_DIR/.env.prod\"

              # 安裝/同步依賴
              cd \$TARGET_DIR
              if ! command -v uv &> /dev/null; then
                curl -LsSf https://astral.sh/uv/install.sh | sh
                export PATH=\$HOME/.local/bin:\$PATH
              fi

              echo '🛠️ Syncing dependencies...'
              \$HOME/.local/bin/uv sync --frozen --no-dev

              # 啟動服務
              chmod +x scripts/prod/run.sh
              ./scripts/prod/run.sh
            "